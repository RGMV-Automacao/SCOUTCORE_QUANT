name: e2e

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SCOUT_DB: ${{ github.workspace }}/data/scout-e2e.db
      ENGINE_B_AVAILABLE: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Seed minimal SQLite fixture
        run: |
          mkdir -p data
          node scripts/seed-e2e-fixture.mjs

      - name: Start API in background
        run: |
          node apps/api/src/index.mjs > api.log 2>&1 &
          echo $! > api.pid
          # Wait for /v1/health
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:4040/v1/health && break
            sleep 1
          done

      - name: E2E predict + settle + evaluation
        run: node scripts/e2e-smoke.mjs

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then kill $(cat api.pid) || true; fi
          cat api.log || true
